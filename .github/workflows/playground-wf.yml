name: Playground Workflow

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  GLOBAL_REPO_VAR: github-repo-variables
  GH_PAT: ${{ secrets.GH_PAT }}
  WF_APP_ID: ${{ secrets.WF_APP_ID }}
  WF_APP_PRIVATE_KEY: ${{ secrets.WF_APP_PRIVATE_KEY }}
  GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

defaults:
  run:
    shell: bash

jobs:
  test-variables:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        AMBIENTE: [des, prd, qa, tqs]
    environment: ${{ matrix.AMBIENTE == 'prd' && 'prd-vars' || matrix.AMBIENTE == 'tqs' &&  'tqs-vars' || matrix.AMBIENTE }}
    steps:
      - name: Export final environment name
        run: |
          if [[ "${{ matrix.AMBIENTE }}" == "prd" ]]; then
            echo "FINAL_ENV=prd-vars" >> $GITHUB_ENV
          elif [[ "${{ matrix.AMBIENTE }}" == "tqs" ]]; then
            echo "FINAL_ENV=tqs-vars" >> $GITHUB_ENV
          else
            echo "FINAL_ENV=${{ matrix.AMBIENTE }}" >> $GITHUB_ENV
          fi

      - name: Generate token
        id: generate-token
        uses: Illusion-Factory-Labs/github-repo-templates/actions/auth/generate-gh-token@main
      
      - name: "Get environments with GH CLI using the generated token"
        id: gh-cli-ops
        run: |
          set -euo pipefail

          if [[ -z "${GHTOKEN:-}" ]]; then
            echo "GHTOKEN is empty. GitHub App token was not exported."
            exit 1
          fi

          export GH_TOKEN="$GHTOKEN"

          REPO="${{ github.repository }}"
          SOURCE_ENV="${{ matrix.AMBIENTE }}"
          DEST_ENV="$FINAL_ENV"
          API_PATH="repos/$REPO/environments/$SOURCE_ENV/variables"

          if ! response="$(gh api "$API_PATH" 2>&1)"; then
            if [[ "$response" == *"Resource not accessible by integration"* ]] && [[ -n "${GH_PAT:-}" ]]; then
              echo "GitHub App token sem acesso a variaveis de ambiente. Tentando fallback com GH_PAT."
              export GH_TOKEN="$GH_PAT"
              response="$(gh api "$API_PATH")"
            else
              echo "$response"
              exit 1
            fi
          fi

          # if [[ "$(jq -r '(.variables // []) | length' <<< "$response")" -eq 0 ]]; then
          #   echo "No variables found for environment: $FINAL_ENV"
          #   exit 0
          # fi

          # jq -c '(.variables // [])[]' <<< "$response" | while read -r var; do
          #   name=$(echo "$var" | jq -r '.name')
          #   value=$(echo "$var" | jq -r '.value')
          #   echo "Variable Name: $name, Variable Value: $value"
          # done