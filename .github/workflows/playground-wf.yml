name: Playground Workflow

on:
  workflow_dispatch:
    inputs:
      DRY_RUN:
        description: 'Turn dry-run mode on or off.'
        required: false
        type: choice
        default: 'true'
        options:
          - 'true'
          - 'false'
      VARS_TO_SYNC:
        description: >-
          'Optional comma of source variable names to sync. Accepted formats: JSON array (e.g. ["VAR_A", "VAR_B"]) or 
          comma-separated, no space, string (e.g. VAR_A,VAR_B). Defaults to empty JSON array, which means sync all source variables.'
        required: false
        type: string
        default: '[]'
      DEL_ENV:
        description: 'Whether to delete the destination environment after syncing variables.'
        required: false
        type: choice
        default: 'false'
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

env:
  GLOBAL_REPO_VAR: github-repo-variables
  GH_PAT: ${{ secrets.GH_PAT }}
  WF_APP_ID: ${{ secrets.WF_APP_ID }}
  WF_APP_PRIVATE_KEY: ${{ secrets.WF_APP_PRIVATE_KEY }}
  GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

defaults:
  run:
    shell: bash

jobs:
  test-variables:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        AMBIENTE: [des, prd, qa, tqs]
    environment: ${{ matrix.AMBIENTE == 'prd' && 'prd-vars' || (matrix.AMBIENTE == 'tqs' &&  'tqs-vars' || matrix.AMBIENTE) }}
    steps:
      - name: Generate token
        uses: Illusion-Factory-Labs/github-repo-templates/actions/auth/generate-gh-token@main
      
      - name: "Sync repo environment variables from '${{ matrix.AMBIENTE }}' to '${{ matrix.AMBIENTE == 'prd' && 'prd-vars' || matrix.AMBIENTE == 'tqs' && 'tqs-vars' }}'"
        id: sync-vars  
        if: ${{ matrix.AMBIENTE == 'prd' || matrix.AMBIENTE == 'tqs' }}
        uses: Illusion-Factory-Labs/github-repo-templates/actions/components/sync-existing-env-vars@main
        with:
          DRY_RUN: ${{ inputs.DRY_RUN }}
          DEL_ENV: ${{ inputs.DEL_ENV }}
          
      
      - name: "Debug vars source vs vars context"
        if: ${{ matrix.AMBIENTE == 'prd' || matrix.AMBIENTE == 'tqs' }}
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ env.GHTOKEN }}
        run: |
          set -euo pipefail

          echo "=== DEBUG: matrix.AMBIENTE ==="
          echo "${{ matrix.AMBIENTE }}"

          echo "=== DEBUG: FINAL_ENV ==="
          echo "${{ matrix.AMBIENTE == 'prd' && 'prd-vars' || matrix.AMBIENTE == 'tqs' && 'tqs-vars' }}"

          FINAL_ENV="${{ matrix.AMBIENTE == 'prd' && 'prd-vars' || matrix.AMBIENTE == 'tqs' && 'tqs-vars' }}"

          echo "=== DEBUG: vars context snapshot (toJson(vars)) ==="
          echo '${{ toJson(vars) }}' | jq .

          echo "=== DEBUG: vars do ambiente de destino '${FINAL_ENV}' ==="
          CHANGED_VARS_JSON='${{ steps.sync-vars.outputs.changed_variables_json }}'
          
          echo "${CHANGED_VARS_JSON:-[]}" | jq .

          missing_vars=0
          while IFS= read -r var_name; do
            [[ -z "$var_name" ]] && continue

            echo "=== DEBUG: checking variable '$var_name' in runtime env ==="
            if printenv "$var_name" >/dev/null; then
              printf '%s\n' "${!var_name}"
            else
              echo "Variable '$var_name' was not exported to the runtime environment."
              missing_vars=1
            fi
          done < <(echo "${CHANGED_VARS_JSON:-[]}" | jq -r '.[]')

          if [[ "$missing_vars" -ne 0 ]]; then
            echo "One or more changed variables are missing from the runtime environment."
            exit 1
          fi

          echo "All changed variables were exported to the runtime environment."

      - name: "Excluir ambiente ${{ matrix.AMBIENTE == 'prd' && 'prd-vars' || matrix.AMBIENTE == 'tqs' && 'tqs-vars' }}"
        if: ${{ matrix.AMBIENTE == 'prd' || matrix.AMBIENTE == 'tqs' }}
        uses: Illusion-Factory-Labs/github-repo-templates/actions/components/remove-github-env@main
        with:
          DRY_RUN: ${{ inputs.DRY_RUN }}