name: Playground Workflow

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  GLOBAL_REPO_VAR: github-repo-variables
  GH_PAT: ${{ secrets.GH_PAT }}
  WF_APP_ID: ${{ secrets.WF_APP_ID }}
  WF_APP_PRIVATE_KEY: ${{ secrets.WF_APP_PRIVATE_KEY }}
  GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

defaults:
  run:
    shell: bash

jobs:
  test-variables:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        AMBIENTE: [des, prd, qa, tqs]
    environment: ${{ matrix.AMBIENTE == 'prd' && 'prd-vars' || matrix.AMBIENTE == 'tqs' &&  'tqs-vars' || matrix.AMBIENTE }}
    steps:
      - name: Export final environment name
        run: |
          if [[ "${{ matrix.AMBIENTE }}" == "prd" ]]; then
            echo "FINAL_ENV=prd-vars" >> $GITHUB_ENV
          elif [[ "${{ matrix.AMBIENTE }}" == "tqs" ]]; then
            echo "FINAL_ENV=tqs-vars" >> $GITHUB_ENV
          else
            echo "FINAL_ENV=${{ matrix.AMBIENTE }}" >> $GITHUB_ENV
          fi

      - name: Generate token
        id: generate-token
        uses: Illusion-Factory-Labs/github-repo-templates/actions/auth/generate-gh-token@main
      
      - name: "Get environments with GH CLI using the generated token"
        id: gh-cli-ops
        env:
          GH_TOKEN: ${{ env.GHTOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "GH_TOKEN is empty. GitHub App token was not exported."
            exit 1
          fi

          REPO="${{ github.repository }}"
          SOURCE_ENV="${{ matrix.AMBIENTE }}"
          DEST_ENV="$FINAL_ENV"
          SOURCE_API_ENDPOINT="repos/$REPO/environments/$SOURCE_ENV/variables"
          DEST_API_ENDPOINT="repos/$REPO/environments/$DEST_ENV/variables"

          response="$(gh api "$SOURCE_API_ENDPOINT")"
          dest_response="$(gh api "$DEST_API_ENDPOINT")"

          declare -A DEST_VAR_NAMES=()
          while read -r existing_name; do
            [[ -z "$existing_name" ]] && continue
            DEST_VAR_NAMES["$existing_name"]=1
          done < <(jq -r '(.variables // [])[].name' <<< "$dest_response")

          if [[ "$(jq -r '(.variables // []) | length' <<< "$response")" -eq 0 ]]; then
              echo "No variables found for environment: $SOURCE_ENV"
              exit 0
          fi

          jq -c '(.variables // [])[]' <<< "$response" | while read -r var;
          do
              name=$(echo "$var" | jq -r '.name')
              value=$(echo "$var" | jq -r '.value')

              if [[ -n "${DEST_VAR_NAMES[$name]:-}" ]]; then
                echo "Skipping variable '$name' because it already exists in '$DEST_ENV'."
                continue
              fi
              
              gh api --method POST -H 'Accept: application/vnd.github+json' "$DEST_API_ENDPOINT" -f name="$name" -f value="$value"
              DEST_VAR_NAMES["$name"]=1
          done