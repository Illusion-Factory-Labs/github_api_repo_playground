name: Playground Workflow

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  GLOBAL_REPO_VAR: github-repo-variables
  GH_PAT: ${{ secrets.GH_PAT }}
  WF_APP_ID: ${{ secrets.WF_APP_ID }}
  WF_APP_PRIVATE_KEY: ${{ secrets.WF_APP_PRIVATE_KEY }}
  GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

defaults:
  run:
    shell: bash

jobs:
  test-variables:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        AMBIENTE: [des, prd, qa, tqs]
    environment: ${{ matrix.AMBIENTE == 'prd' && 'prd-vars' || matrix.AMBIENTE == 'tqs' &&  'tqs-vars' || matrix.AMBIENTE }}
    steps:
      - name: Generate token
        uses: Illusion-Factory-Labs/github-repo-templates/actions/auth/generate-gh-token@main
      
      - name: "Sync repo environment variables from '${{ matrix.AMBIENTE }}' to '${{ matrix.AMBIENTE == 'prd' && 'prd-vars' || matrix.AMBIENTE == 'tqs' && 'tqs-vars' }}'"
        if: ${{ matrix.AMBIENTE == 'prd' || matrix.AMBIENTE == 'tqs' }}
        uses: Illusion-Factory-Labs/github-repo-templates/actions/components/sync-existing-env-vars@main
        with:
          dry_run: "0"
          source_environment: ${{ matrix.AMBIENTE }}
          destination_environment: ${{ matrix.AMBIENTE == 'prd' && 'prd-vars' || matrix.AMBIENTE == 'tqs' && 'tqs-vars' }}
      
      - name: "Debug vars source vs vars context"
        if: ${{ matrix.AMBIENTE == 'prd' || matrix.AMBIENTE == 'tqs' }}
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ env.GHTOKEN }}
        run: |
          set -euo pipefail

          echo "=== DEBUG: matrix.AMBIENTE ==="
          echo "${{ matrix.AMBIENTE }}"
          echo "=== DEBUG: FINAL_ENV ==="
          echo "${{ matrix.AMBIENTE == 'prd' && 'prd-vars' || matrix.AMBIENTE == 'tqs' && 'tqs-vars' }}"

          FINAL_ENV="${{ matrix.AMBIENTE == 'prd' && 'prd-vars' || matrix.AMBIENTE == 'tqs' && 'tqs-vars' }}"

          echo "=== DEBUG: vars context snapshot (toJson(vars)) ==="
          echo '${{ toJson(vars) }}' | jq .

          echo "=== DEBUG: GitHub API environment vars for FINAL_ENV ==="
          gh api "repos/${{ github.repository }}/environments/$FINAL_ENV/variables" | jq .