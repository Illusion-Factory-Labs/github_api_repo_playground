name: Playground Workflow

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  GLOBAL_REPO_VAR: github-repo-variables
  GH_PAT: ${{ secrets.GH_PAT }}
  WF_APP_ID: ${{ secrets.WF_APP_ID }}
  WF_APP_PRIVATE_KEY: ${{ secrets.WF_APP_PRIVATE_KEY }}
  GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

defaults:
  run:
    shell: bash

jobs:
  test-variables:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token with GitHub App
        id: generate-token
        uses: Illusion-Factory-Labs/github-repo-templates/actions/auth/generate-gh-token@main
      
      - name: "GitHub CLI Operations with Generated Token"
        id: gh-cli-ops
        run: |
          echo "🔍 ===== [GH CLI] Verificando autenticação com o token do GitHub App. ====="
          if [[ -z "$GHTOKEN" ]]; then
            echo "❌ ===== [GH CLI] Token ausente. Verifique a geração do token do GitHub App. ====="
            exit 1
          fi

          export GH_TOKEN="$GHTOKEN"

          # O GH CLI usa GH_TOKEN automaticamente; não é necessário gh auth login.
          gh auth status
          
          # Verifica a autenticação
          echo "✅ ===== [GH CLI] Autenticação bem-sucedida. Exibindo informações do repositório acessível pelo token. ====="
          gh api repos/${{ github.repository }} --jq '.full_name'