name: Playground Workflow

on:
  workflow_dispatch:
    inputs:
      BUILD_VERSION:
        description: 'Version to build and deploy.'
        required: true
        default: '0.0.1'
      DOTNET_VERSION:
        required: true
        type: string
        default: '8.0'
      DRY_RUN_SYNC:
        description: 'Turn dry-run mode on or off for variable synchronization.'
        required: false
        type: choice
        default: 'true'
        options:
          - 'true'
          - 'false'
      DRY_RUN_ENV:
        description: 'Turn dry-run mode on or off for environment removal.'
        required: false
        type: choice
        default: 'true'
        options:
          - 'true'
          - 'false'
      VARS_TO_SYNC:
        description: >-
          'Optional comma of source variable names to sync. Accepted formats: JSON array (e.g. ["VAR_A", "VAR_B"]) or 
          comma-separated, no space, string (e.g. VAR_A,VAR_B). Defaults to empty JSON array, which means sync all source variables.'
        required: false
        type: string
        default: '[]'
      

permissions:
  contents: read

env:
  BUILD_VERSION: ${{ inputs.BUILD_VERSION }}
  DOTNET_VERSION: "${{ inputs.DOTNET_VERSION }}"
  ADV_SEC_LANG: "csharp"
  
  GLOBAL_REPO_VAR: github-repo-variables
  GH_PAT: ${{ secrets.GH_PAT }}
  WF_APP_ID: ${{ secrets.WF_APP_ID }}
  WF_APP_PRIVATE_KEY: ${{ secrets.WF_APP_PRIVATE_KEY }}
  GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

defaults:
  run:
    shell: bash

jobs:
  test-variables:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        AMBIENTE: [des, prd, qa, tqs]
    environment: ${{ matrix.AMBIENTE == 'prd' && 'prd-vars' || (matrix.AMBIENTE == 'tqs' &&  'tqs-vars' || matrix.AMBIENTE) }}
    steps:
      - name: "Api Dotnet Variables"
        uses: Illusion-Factory-Labs/github-repo-templates/actions/context/dotnet-api@main
      - name: "Token Create"
        uses: Illusion-Factory-Labs/github-repo-templates/actions/auth/githubapp@main
      - name: "Sincronizar ambiente temporário para importação de variáveis (evitar aprovação manual)"
        id: sync-temp-env-vars
        if: ${{ matrix.AMBIENTE == 'prd' || matrix.AMBIENTE == 'tqs' }}
        uses: Illusion-Factory-Labs/github-repo-templates/actions/components/sync-github-env-vars@main
      - name: "File Variable Groups '${{ matrix.AMBIENTE }}'"
        id: file-variable-group
        uses: Illusion-Factory-Labs/github-repo-templates/actions/components/file-variable-group@main
      - name: "Load Variable Groups '${{ matrix.AMBIENTE }}'"
        uses: Illusion-Factory-Labs/github-repo-templates/actions/components/load-variable-group@main
        with:
          VARS_FILE: ${{ steps.file-variable-group.outputs.VARS_FILE }}
          VARS_CONTEXT: ${{ toJson(vars) }}
          VARS_TEMP_ENV: ${{ steps.sync-temp-env-vars.outputs.changed_variables_json }}
  
  remove-temp-env:
    runs-on: ubuntu-latest
    needs: test-variables
    strategy:
      matrix:
        AMBIENTE: [prd-vars, tqs-vars]
    steps:
      - name: "Token Create"
        uses: Illusion-Factory-Labs/github-repo-templates/actions/auth/githubapp@main
        
      - name: "Remover ambiente temporário de importação de variáveis"
        uses: Illusion-Factory-Labs/github-repo-templates/actions/components/remove-github-env@main
        with:
          DRY_RUN_ENV: ${{ inputs.DRY_RUN_ENV }}
      
      # - name: "Create Configmap"
      #   uses: Illusion-Factory-Labs/github-repo-templates/actions/components/create-configmap-dotnet@main
